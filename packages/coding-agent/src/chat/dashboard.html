<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>omp-bot — Zero</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --border:#30363d;
  --text:#c9d1d9;
  --dim:#8b949e;
  --cyan:#58a6ff;
  --green:#3fb950;
  --magenta:#bc8cff;
  --amber:#d2991d;
  --red:#f85149;
  --font:ui-monospace,SFMono-Regular,"JetBrains Mono","Fira Code",monospace;
  --radius:6px;
}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--font);padding:24px;max-width:960px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
header h1{font-size:18px;font-weight:600;color:var(--cyan)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px}
.status-dot.off{background:var(--red)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.card h2{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--magenta);text-transform:uppercase;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stat{text-align:center}
.stat .val{font-size:24px;font-weight:700;color:var(--cyan)}
.stat .lbl{font-size:11px;color:var(--dim);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--dim);font-weight:500;font-size:11px;text-transform:uppercase}
td{color:var(--text)}
td.replied{color:var(--green)}
td.skipped{color:var(--dim)}
td.error{color:var(--red)}
select,input,textarea,button{font:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--cyan)}
textarea{width:100%;min-height:120px;resize:vertical;line-height:1.4}
button{cursor:pointer;padding:6px 16px;font-weight:500}
button:hover{background:var(--border)}
button.primary{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}
button.primary:hover{opacity:.9}
button.danger{color:var(--red)}
.flex{display:flex;gap:8px;align-items:center}
.muted{color:var(--dim);font-size:11px}
.loading{color:var(--amber)}
.badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
.badge-all{background:var(--cyan);color:var(--bg)}
.badge-mention{background:var(--magenta);color:var(--bg)}
.badge-smart{background:var(--amber);color:var(--bg)}
.badge-off{background:var(--dim);color:var(--bg)}
#prompt-status{font-size:11px}
.error-msg{color:var(--red);font-size:12px;margin-top:4px}
</style>
</head>
<body>

<header>
  <div class="flex">
    <span class="status-dot" id="status-dot"></span>
    <h1>omp-bot</h1>
    <span class="muted" id="bot-name"></span>
  </div>
  <div class="muted" id="clock"></div>
</header>

<!-- Overview -->
<div class="card">
  <h2>Overview</h2>
  <div class="grid" id="overview"></div>
</div>

<!-- Channels -->
<div class="card">
  <h2>Channels</h2>
  <div id="channels-table"></div>
  <div class="flex" style="margin-top:12px">
    <select id="ch-type"><option value="private">Private</option><option value="group">Group</option></select>
    <input id="ch-id" placeholder="QQ ID or Group ID" style="width:160px">
    <input id="ch-name" placeholder="Display name" style="width:140px">
    <select id="ch-mode"><option value="all">All</option><option value="mention_only">Mention Only</option><option value="smart">Smart</option><option value="off">Off</option></select>
    <button class="primary" onclick="addChannel()">+ Add</button>
  </div>
</div>

<!-- Persona -->
<div class="card">
  <h2>Persona</h2>
  <textarea id="prompt-editor" placeholder="No override — using default Zero prompt"></textarea>
  <div class="flex" style="margin-top:8px">
    <button class="primary" onclick="savePrompt()">Save Prompt</button>
    <button onclick="resetPrompt()">Reset to Default</button>
    <span id="prompt-status" class="muted"></span>
  </div>
</div>

<!-- Activity -->
<div class="card">
  <h2>Recent Activity</h2>
  <div id="activity-table"></div>
</div>

<script>
const API = '/api';

async function get(path) {
  const r = await fetch(API + path);
  return r.json();
}

async function post(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  return r.json();
}

async function put(path, body) {
  const r = await fetch(API + path, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  return r.json();
}

async function del(path) {
  const r = await fetch(API + path, {method: 'DELETE'});
  return r.json();
}

// Clock
function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleString();
}
tick();
setInterval(tick, 1000);

// Status dot
async function checkStatus() {
  try {
    const h = await fetch('/health');
    const d = await h.json();
    const dot = document.getElementById('status-dot');
    dot.className = d.onebot_connected ? 'status-dot' : 'status-dot off';
    document.getElementById('bot-name').textContent = d.onebot_connected ? '● QQ Connected' : '○ QQ Disconnected';
  } catch(e) {
    document.getElementById('status-dot').className = 'status-dot off';
  }
}
checkStatus();
setInterval(checkStatus, 10000);

// Load all panels
async function loadAll() {
  await Promise.all([loadOverview(), loadChannels(), loadPrompt(), loadActivity()]);
}

// Overview
async function loadOverview() {
  const d = await get('/overview');
  document.getElementById('overview').innerHTML = `
    <div class="stat"><div class="val">${d.sessionCount}</div><div class="lbl">Sessions</div></div>
    <div class="stat"><div class="val">${d.channelCount}</div><div class="lbl">Channels</div></div>
    <div class="stat"><div class="val">${d.messagesToday}</div><div class="lbl">Msgs Today</div></div>
    <div class="stat"><div class="val">${d.repliedToday}</div><div class="lbl">Replied</div></div>
    <div class="stat"><div class="val">${d.skippedToday}</div><div class="lbl">Skipped</div></div>
    <div class="stat"><div class="val">${d.errorsToday}</div><div class="lbl">Errors</div></div>
  `;
}

// Channels
async function loadChannels() {
  const channels = await get('/channels');
  if (channels.length === 0) {
    document.getElementById('channels-table').innerHTML = '<span class="muted">No channels configured. Defaults: private→all, group→mention_only</span>';
    return;
  }
  let html = '<table><tr><th>Type</th><th>ID</th><th>Name</th><th>Mode</th><th>Keywords</th><th></th></tr>';
  for (const c of channels) {
    const badge = `badge-${c.triggerMode === 'mention_only' ? 'mention' : c.triggerMode}`;
    html += `<tr>
      <td>${c.targetType}</td>
      <td>${c.targetId}</td>
      <td>${c.displayName || '-'}</td>
      <td><span class="badge ${badge}">${c.triggerMode}</span></td>
      <td>${(c.keywords || []).join(', ') || '-'}</td>
      <td><button class="danger" onclick="removeChannel('${c.targetType}:${c.targetId}')">×</button></td>
    </tr>`;
  }
  html += '</table>';
  document.getElementById('channels-table').innerHTML = html;
}

async function addChannel() {
  const type = document.getElementById('ch-type').value;
  const id = parseInt(document.getElementById('ch-id').value);
  const name = document.getElementById('ch-name').value;
  const mode = document.getElementById('ch-mode').value;
  if (!id) return alert('Enter QQ ID');
  await post('/channels', { targetType: type, targetId: id, displayName: name, triggerMode: mode });
  loadChannels();
}

async function removeChannel(key) {
  await del('/channels?key=' + encodeURIComponent(key));
  loadChannels();
}

// Prompt
async function loadPrompt() {
  const d = await get('/prompt');
  document.getElementById('prompt-editor').value = d.prompt || '';
  document.getElementById('prompt-editor').placeholder = d.prompt ? '' : 'No override — using default Zero prompt';
}

async function savePrompt() {
  const prompt = document.getElementById('prompt-editor').value;
  await put('/prompt', { prompt });
  document.getElementById('prompt-status').textContent = '✓ Saved ' + new Date().toLocaleTimeString();
}

async function resetPrompt() {
  document.getElementById('prompt-editor').value = '';
  await put('/prompt', { prompt: '' });
  document.getElementById('prompt-status').textContent = '✓ Reset to default';
  loadPrompt();
}

// Activity
async function loadActivity() {
  const activity = await get('/activity?limit=50');
  if (activity.length === 0) {
    document.getElementById('activity-table').innerHTML = '<span class="muted">No activity yet.</span>';
    return;
  }
  let html = '<table><tr><th>Time</th><th>User</th><th>Message</th><th>Decision</th><th>Reply</th></tr>';
  for (const a of activity.reverse()) {
    const cls = a.decision === 'replied' ? 'replied' : a.decision === 'error' ? 'error' : 'skipped';
    html += `<tr>
      <td class="muted">${new Date(a.timestamp).toLocaleTimeString()}</td>
      <td>${a.userName}</td>
      <td>${esc(a.message)}</td>
      <td class="${cls}">${a.decision}</td>
      <td class="${cls}">${esc(a.reply || a.reason)}</td>
    </tr>`;
  }
  html += '</table>';
  document.getElementById('activity-table').innerHTML = html;
}

function esc(s) {
  if (!s) return '-';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-refresh
loadAll();
setInterval(loadAll, 15000);
</script>
</body>
</html>
